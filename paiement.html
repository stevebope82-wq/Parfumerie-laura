<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Finaliser ma commande | LMK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Petite sécurité pour le mobile : on empile Nom et Post-nom si l'écran est petit */
        @media (max-width: 480px) {
            .name-fields {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">LMK PARFUMERIE <span><i class="fas fa-spray-can"></i></span></div>
        <nav><ul><li><a href="panier.html">RETOUR AU PANIER</a></li></ul></nav>
    </header>

    <div class="cart-page-container">
        <div class="summary-card" style="max-width: 600px; margin: 40px auto; float: none;">
            <h2 style="font-family: var(--serif); margin-bottom: 25px; text-align: center;">Mes Coordonnées</h2>
            
            <form id="checkoutForm">
                <div class="name-fields" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <input type="text" id="lastName" placeholder="Nom" required style="padding:12px; border:1px solid #ddd; border-radius:5px; width: 100%; box-sizing: border-box;">
                    <input type="text" id="postName" placeholder="Post-nom" style="padding:12px; border:1px solid #ddd; border-radius:5px; width: 100%; box-sizing: border-box;">
                </div>

                <input type="text" id="firstName" placeholder="Prénom" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:5px; margin-bottom:15px; box-sizing: border-box;">
                
                <input type="tel" id="userPhone" placeholder="Numéro de Téléphone (ex: +243...)" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:5px; margin-bottom:15px; box-sizing: border-box;">
                
                <input type="email" id="userEmail" placeholder="Adresse Email" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:5px; margin-bottom:20px; box-sizing: border-box;">

                <p style="font-weight: bold; font-size: 0.9rem; margin-bottom:10px;">MODE DE PAIEMENT :</p>
                <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 25px;">
                    <label style="display:block; margin-bottom:10px; cursor:pointer;"><input type="radio" name="payment" value="M-Pesa" checked> M-Pesa 📱</label>
                    <label style="display:block; margin-bottom:10px; cursor:pointer;"><input type="radio" name="payment" value="Airtel Money"> Airtel Money 💳</label>
                    <label style="display:block; cursor:pointer;"><input type="radio" name="payment" value="Boutique"> Paiement en Boutique 🏠</label>
                </div>

                <button type="button" class="btn-order" onclick="app.generateWhatsAppReceipt()" style="width: 100%;">
                    GÉNÉRER MON RÉCIT WHATSAPP <i class="fab fa-whatsapp"></i>
                </button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
